# Configuración de pytest
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Marcadores
markers =
    unit: Tests unitarios
    integration: Tests de integración
    slow: Tests que tardan mucho